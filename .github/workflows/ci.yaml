name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 关键：先安装pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9 # 可固定pnpm版本，写latest用最新

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '>=18'
          cache: 'pnpm' # 缓存pnpm依赖，提速

      - name: Install dependencies
        run: pnpm install # 替代 npm ci

      - name: Run lint
        run: pnpm lint



      - name: Build
        run: pnpm build